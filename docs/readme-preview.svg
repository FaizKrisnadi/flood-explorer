<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">flood-explorer preview</title>
  <desc id="desc">Stylized preview of the flood-explorer dashboard showing a left sidebar, choropleth map, legend, and timeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="52%" stop-color="#f7f9fc"/>
      <stop offset="100%" stop-color="#fff4ea"/>
    </linearGradient>
    <linearGradient id="timeline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4b86ff"/>
      <stop offset="100%" stop-color="#ff7a18"/>
    </linearGradient>
    <linearGradient id="statGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dce8ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#8ea4c1" flood-opacity="0.22"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#9fb0c7" flood-opacity="0.18"/>
    </filter>
    <style>
      .label { font: 600 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #6e8199; letter-spacing: 0.08em; }
      .body { font: 500 17px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #768aa3; }
      .value { font: 700 26px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #1d2b44; }
      .valueBlue { font: 700 26px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #3b7cff; }
      .title { font: 700 22px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #24344d; }
      .small { font: 600 16px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #4f6f95; }
      .pillText { font: 700 15px 'Inter', 'Segoe UI', Arial, sans-serif; }
      .mapText { font: 700 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #1f2430; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

