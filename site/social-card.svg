<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">flood-explorer social card</title>
  <desc id="desc">A stylized preview of the flood-explorer dashboard with a left control panel and flood intensity map over Indonesia.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1f6ff"/>
      <stop offset="50%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#fff3e7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
    <linearGradient id="range" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4b86ff"/>
      <stop offset="100%" stop-color="#ff7a18"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#95a7c4" flood-opacity="0.22"/>
    </filter>
    <style>
      .title { font: 700 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #24344d; }
      .body { font: 500 14px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #7d8ea6; }
      .label { font: 700 14px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #6f8199; letter-spacing: 0.08em; }
      .value { font: 700 20px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #1d2b44; }
      .valueBlue { font: 700 20px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #3f82ff; }
      .pill { font: 700 14px 'Inter', 'Segoe UI', Arial, sans-serif; }
      .mapText { font: 700 15px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #1f2430; }
    </style>
  </defs>

